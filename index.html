<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe AI AR Spawner</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; }
    h1 { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); margin-bottom: 10px; }
    
    /* The Description Box */
    .description-box { 
      background: #1e293b; 
      padding: 15px; 
      border-radius: 10px; 
      margin: 0 auto 20px auto; 
      max-width: 600px; 
      border-left: 4px solid #00ff88;
      font-size: 14px;
      line-height: 1.5;
      color: #cbd5e1;
    }

    model-viewer { width: 95%; height: 450px; background: radial-gradient(#1e293b, #0f172a); border-radius: 20px; margin: 20px auto; border: 1px solid #334155; }
    .controls { background: #1e293b; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    input { padding: 12px; border-radius: 8px; border: 1px solid #334155; width: 220px; background: #0f172a; color: white; outline: none; }
    button { padding: 12px 25px; background: #00ff88; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; cursor: pointer; margin: 5px; }
    #status { margin-top: 15px; font-weight: bold; color: #94a3b8; min-height: 20px; }
    .ar-button { background-color: white; border-radius: 8px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px 20px; color: black; font-weight: bold; }
    .key-btn { background: #64748b; color: white; font-size: 10px; padding: 5px 10px; margin-top: 10px; }
  </style>
</head>
<body>

  <h1>🚀 AI AR Spawner</h1>

  <div class="description-box">
    <strong>What is this?</strong> This app uses <strong>Gemini AI</strong> to understand what you want to see. 
    Type a hint like <em>"something to drive"</em> or <em>"a yellow bird"</em> and the AI will pick the 3D model for you. 
    Click <strong>"View in AR"</strong> to put it in your room!
  </div>

  <model-viewer id="viewer" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" ar camera-controls touch-action="pan-y">
    <button slot="ar-button" class="ar-button">📷 VIEW IN AR</button>
  </model-viewer>

  <div class="controls">
    <input type="text" id="prompt" placeholder="Ask for an object...">
    <button onclick="spawnNow()">Spawn</button>
    <br>
    <button class="key-btn" onclick="resetKey()">Reset API Key</button>
    <div id="status">Ready to build!</div>
  </div>

  <script>
    const modelLibrary = {
      "robot": "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BrainStem/glTF-Binary/BrainStem.glb",
      "astronaut": "https://modelviewer.dev/shared-assets/models/Astronaut.glb",
      "chair": "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/SheenChair/glTF-Binary/SheenChair.glb",
      "duck": "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb",
      "car": "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ToyCar/glTF-Binary/ToyCar.glb"
    };

    function resetKey() {
      localStorage.removeItem("my_gemini_key");
      alert("API Key cleared. You'll be asked for it again next time.");
    }

    async function spawnNow() {
      const input = document.getElementById('prompt').value;
      const status = document.getElementById('status');
      const viewer = document.getElementById('viewer');
      
      // Look for the key in private browser storage
      let API_KEY = localStorage.getItem("my_gemini_key");

      if (!API_KEY) {
        API_KEY = prompt("Enter your Gemini API Key (Stored only on your device):");
        if (API_KEY) {
          localStorage.setItem("my_gemini_key", API_KEY);
        } else {
          status.innerText = "⚠️ Key required!";
          return;
        }
      }

      status.style.color = "#94a3b8";
      status.innerText = "🤖 Gemini is thinking...";

      const aiPrompt = `The user said: "${input}". Pick the best match from this list ONLY: robot, astronaut, chair, duck, car. Respond with exactly one word.`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: aiPrompt }] }] })
        });

        const data = await response.json();
        const aiChoice = data.candidates[0].content.parts[0].text.trim().toLowerCase();

        if (modelLibrary[aiChoice]) {
          viewer.src = modelLibrary[aiChoice];
          status.style.color = "#00ff88";
          status.innerText = "✅ AI chose " + aiChoice.toUpperCase();
        } else {
          status.style.color = "#ffbb33";
          status.innerText = "❓ AI suggested " + aiChoice + " (Not in list)";
        }
      } catch (error) {
        status.style.color = "#ff4444";
        status.innerText = "⚠️ Error! Check your key.";
      }
    }
  </script>
</body>
</html>
</html>
